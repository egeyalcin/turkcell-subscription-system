apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
  namespace: turkcell
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-service
  template:
    metadata:
      labels:
        app: gateway-service
    spec:
      containers:
        - name: gateway-service
          image: gateway-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8016
          env:
            - name: SPRING_CLOUD_CONFIG_URI
              value: "http://config-server-svc.turkcell:8888"
            - name: SPRING_CLOUD_GATEWAY_ROUTES_0_URI
              value: "http://subscription-service.turkcell:8017"
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: turkcell
spec:
  type: NodePort
  selector:
    app: gateway-service
  ports:
    - port: 8016
      targetPort: 8016
      nodePort: 30016