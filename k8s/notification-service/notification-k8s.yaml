apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: turkcell
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: notification-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8019
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8019
            initialDelaySeconds: 15
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8019
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: turkcell
spec:
  type: NodePort
  selector:
    app: notification-service
  ports:
    - port: 8019
      targetPort: 8019
      nodePort: 30003