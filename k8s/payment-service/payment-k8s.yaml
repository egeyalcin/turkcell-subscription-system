apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: turkcell
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
        - name: payment-service
          image: payment-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8018
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8018
            initialDelaySeconds: 15
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8018
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: turkcell
spec:
  type: NodePort
  selector:
    app: payment-service
  ports:
    - port: 8018
      targetPort: 8018
      nodePort: 30002