apiVersion: v1
kind: Service
metadata:
  name: kafka-broker-svc
  namespace: turkcell
spec:
  clusterIP: None # Headless Service
  ports:
    - name: kafka-port
      port: 9092
      targetPort: 9092
  selector:
    app: kafka-app
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-deployment
  namespace: turkcell
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-app
  template:
    metadata:
      labels:
        app: kafka-app
    spec:
      containers:
        - name: kafka-container
          image: wurstmeister/kafka
          imagePullPolicy: IfNotPresent
          env:
            # KRİTİK DÜZELTME: Kubernetes'in oluşturduğu hatalı string değişkenleri ezer
            - name: PORT
              value: "9092"
            - name: KAFKA_PORT
              value: "9092"

            # KAFKA AYARLARI
            - name: KAFKA_BROKER_ID
              value: "1"
            - name: KAFKA_ZOOKEEPER_CONNECT
              value: "zookeeper-service:2181"
            - name: KAFKA_LISTENERS
              value: "PLAINTEXT://:9092"
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://kafka-broker-svc:9092"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "PLAINTEXT:PLAINTEXT"
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: "PLAINTEXT"
            # Otomatik topic oluşturulmasını istiyorsan (opsiyonel)
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "true"