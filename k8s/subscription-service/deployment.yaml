apiVersion: apps/v1
kind: Deployment
metadata:
  name: subscription-service
  namespace: turkcell
spec:
  replicas: 2
  selector:
    matchLabels:
      app: subscription-service
  template:
    metadata:
      labels:
        app: subscription-service
    spec:
      containers:
        - name: subscription-service
          image: turkcell-subscription-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8017
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8017
            initialDelaySeconds: 15
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8017
            initialDelaySeconds: 30
            periodSeconds: 10